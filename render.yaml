services:
  # Main API + MCP Server
  - type: web
    name: wisdom-spark-api
    runtime: python
    plan: free
    buildCommand: pip install -e . && pip install pyyaml
    startCommand: uvicorn src.app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: WISDOM_DATABASE_URL
        fromDatabase:
          name: wisdom-spark-db
          property: connectionString
      - key: WISDOM_EMBEDDING_API_KEY
        sync: false
      - key: WISDOM_DEBUG
        value: "false"

  # Autonomous Wisdom Crawler (Background Worker)
  - type: worker
    name: wisdom-spark-crawler
    runtime: python
    plan: free
    buildCommand: pip install -e . && pip install pyyaml
    startCommand: python -m src.crawler.runner
    envVars:
      - key: CRAWLER_DATABASE_URL
        fromDatabase:
          name: wisdom-spark-db
          property: connectionString
      - key: CRAWLER_LLM_API_KEY
        sync: false
      - key: CRAWLER_LLM_PROVIDER
        value: "anthropic"
      - key: CRAWLER_LLM_MODEL
        value: "claude-sonnet-4-20250514"
      - key: CRAWLER_EMBEDDING_API_KEY
        sync: false
      - key: CRAWLER_CRAWL_INTERVAL_MINUTES
        value: "120"
      - key: CRAWLER_MAX_CANDIDATES_PER_RUN
        value: "30"
      - key: CRAWLER_MIN_FLOURISHING_SCORE
        value: "0.6"

databases:
  - name: wisdom-spark-db
    plan: free
    postgresMajorVersion: 16
    ipAllowList: []
