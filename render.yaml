services:
  # Main API + MCP Server + Crawler (triggered via cron)
  - type: web
    name: wisdom-spark-api
    runtime: python
    plan: free
    buildCommand: pip install -e . && pip install pyyaml
    startCommand: uvicorn src.app:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: WISDOM_DATABASE_URL
        fromDatabase:
          name: aristocles-db
          property: connectionString
      - key: WISDOM_EMBEDDING_API_KEY
        sync: false
      - key: CRAWLER_DATABASE_URL
        fromDatabase:
          name: aristocles-db
          property: connectionString
      - key: CRAWLER_LLM_API_KEY
        sync: false
      - key: CRAWLER_LLM_PROVIDER
        value: "anthropic"
      - key: CRAWLER_LLM_MODEL
        value: "claude-sonnet-4-20250514"
      - key: CRAWLER_EMBEDDING_API_KEY
        sync: false
      - key: WISDOM_DEBUG
        value: "false"
      - key: PYTHON_VERSION
        value: "3.11.11"
